<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3a4dbe" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Assembly64</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header>
      <button id="back" aria-label="Back" type="button">&larr;</button>
      <h1 id="crumb">Assembly64</h1>
      <button id="search-toggle" aria-label="Search" type="button">&#x1F50D;</button>
    </header>

    <section id="search-bar" hidden>
      <input
        id="search-input"
        type="search"
        autocomplete="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="Search title (3+ chars)"
      />
      <select id="search-cat">
        <option value="">All</option>
        <option value="Games">Games</option>
        <option value="Demos">Demos</option>
        <option value="Music">Music</option>
        <option value="Intros">Intros</option>
        <option value="Graphics">Graphics</option>
      </select>
    </section>

    <main id="list" aria-live="polite"></main>

    <nav id="pager" hidden>
      <button id="prev" type="button">Prev</button>
      <span id="page-info"></span>
      <button id="next" type="button">Next</button>
    </nav>

    <div id="status" role="status" aria-live="polite"></div>

    <dialog id="info">
      <article id="info-body"></article>
      <menu>
        <button id="info-run" type="button">Run on C64</button>
        <button id="info-close" type="button">Close</button>
      </menu>
    </dialog>

    <script src="/static/app.js"></script>
  </body>
</html>
